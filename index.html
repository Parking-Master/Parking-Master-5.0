<!DOCTYPE html>
<html>
  <head>
    <title>cannon.js - RaycastVehicle</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
      html, body {
        margin: 0;
      }
      canvas {
        position: relative;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <script src="three.js"></script>
    <script src="GLTFLoader.js"></script>
    <script src="cannon.js"></script>
    <script src="PointerLockControls.js"></script>
    <script>
      const antialias = 0.5;
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
      const clock = new THREE.Clock();
      directionalLight = new THREE.DirectionalLight(0xf4e6bc, 2);
      ambientLight = new THREE.AmbientLight(0xefe1a7, 0.5);
      renderer.shadowMap.autoUpdate = false;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.VSMShadowMap;
      renderer.outputEncoding = THREE.sRGBEncoding;
      directionalLight.position.set(40, 50, -20);
      directionalLight.castShadow = true;
      directionalLight.shadow.camera.near = 0.01;
      directionalLight.shadow.camera.far = 500;
      directionalLight.shadow.camera.right = 30;
      directionalLight.shadow.camera.left = -30;
      directionalLight.shadow.camera.top = 30;
      directionalLight.shadow.camera.bottom = -30;
      directionalLight.shadow.mapSize.width = 1024;
      directionalLight.shadow.mapSize.height = 1024;
      directionalLight.shadow.radius = 4;
      directionalLight.shadow.bias = -0.00006;
      ambientLight.position.set(2, 1, 1);
      scene.add(directionalLight);
      scene.add(ambientLight);

      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      scene.add(camera);

      function onWindowResize() {
        renderer.setPixelRatio(1);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth * 0.5, window.innerHeight * 0.5, false);
      }
      window.addEventListener("resize", onWindowResize);
      onWindowResize();

      function animate() {
        const deltaTime = Math.min(0.04, clock.getDelta());
        world.step(deltaTime);
        for (let i = 0; i < vehicleBodies.length; i++) {
          const body = vehicleBodies[i];
          const mesh = vehicleMeshes[i];
          if (body.wheel) {
            vehicle.updateWheelTransform(body.wheel.index);
            body.position.copy(body.wheel.worldTransform.position);
            body.quaternion.copy(body.wheel.worldTransform.quaternion);
          }
          mesh.position.copy(body.position);
          mesh.quaternion.copy(body.quaternion);
        }
        if (car) {
          if (car.shadow) {
            const offset = Math.abs(car.chassis.rotation.y / 10);
            car.shadow.position.set(car.chassis.position.x + offset, 0, car.chassis.position.z + offset);
            car.shadow.rotation.z = car.chassis.rotation.y - Math.PI / 2;
            car.shadow.scale.set(car.shadow.shadowSize[0] + offset, car.shadow.shadowSize[1] + offset, 0);
          }
        }
        for (let i = 0; i < propCars.length; i++) {
          if (propCars[i].position.x < -200) {
            propCars[i].speed = (Math.random() / 2) + 0.5;
            propCars[i].position.x = 200;
          }
          propCars[i].position.x += -propCars[i].speed;
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      let car = null;
      let propCars = [];
      let vehicleBodies = [];
      let vehicleMeshes = [];
      const world = new CANNON.World();
      world.gravity.set(0, -9.82, 0);

      const groundMaterial = new CANNON.Material("groundMaterial");
      const wheelMaterial = new CANNON.Material("wheelMaterial");
      const carMaterial = new CANNON.Material("carMaterial");
      const wheelGroundContactMaterial = new CANNON.ContactMaterial(wheelMaterial, groundMaterial, { friction: 0.3 });
      world.addContactMaterial(wheelGroundContactMaterial);
      const carGroundContactMaterial = new CANNON.ContactMaterial(carMaterial, groundMaterial, { friction: 0.01 });
      world.addContactMaterial(carGroundContactMaterial);

      const engineForce = 5000;
      const maxSteerVal = 0.6;
      function navigate(e) {
        if (e.type != "keydown" && e.type != "keyup") return;
        var keyup = e.type == "keyup";
        vehicle.setBrake(0, 0);
        vehicle.setBrake(0, 1);
        vehicle.setBrake(0, 2);
        vehicle.setBrake(0, 3);
        if (e.keyCode == 38) {
          vehicle.applyEngineForce(keyup ? 0 : -engineForce, 2);
          vehicle.applyEngineForce(keyup ? 0 : -engineForce, 3);
        } else if (e.keyCode == 40) {
          vehicle.applyEngineForce(keyup ? 0 : engineForce, 2);
          vehicle.applyEngineForce(keyup ? 0 : engineForce, 3);
        } else if (e.keyCode == 39) {
          vehicle.setSteeringValue(keyup ? 0 : -maxSteerVal, 2);
          vehicle.setSteeringValue(keyup ? 0 : -maxSteerVal, 3);
        } else if (e.keyCode == 37) {
          vehicle.setSteeringValue(keyup ? 0 : maxSteerVal, 2);
          vehicle.setSteeringValue(keyup ? 0 : maxSteerVal, 3);
        }
      }
      window.addEventListener("keydown", navigate);
      window.addEventListener("keyup", navigate);

      const vehicleWeight = 1416;
      const wheelWeight = 10;
      new THREE.GLTFLoader().load("/map.glb", function(model) {
        map = model.scene;
        map.traverse(x => {
          if (x.material) {
            x.material.metalness = 0.1;
            x.material.roughness = 1;
          }
        });
        scene.add(map);

        sky = new THREE.Mesh(new THREE.SphereGeometry(1000, 25, 25), new THREE.MeshBasicMaterial({ color: 0xffffff, map: new THREE.TextureLoader().load("/0.png"), side: THREE.BackSide }));
        sky.rotation.y = -0.3;
        scene.add(sky);

        const collisionMap = map.getObjectByName("CollisionMap");
        collisionMap.traverse(child => {
          if (child.isMesh) {
            const rotation = new THREE.Vector3(child.rotation.x, child.rotation.y, child.rotation.z);
            child.rotation.set(0, 0, 0);
            const box = new THREE.Box3().setFromObject(child);
            const size = box.getSize(new THREE.Vector3());
            const shape = new CANNON.Box(new CANNON.Vec3(size.x / 2, size.y / 2, size.z / 2));
            const body = new CANNON.Body({ mass: 0, shape: shape, material: groundMaterial });
            world.add(body);
            child.rotation.set(rotation.x, rotation.y, rotation.z);
            box.setFromObject(child);
            const worldPosition = box.min.add(box.max).divide(new THREE.Vector3(2, 2, 2));
            body.position.set(worldPosition.x, worldPosition.y, worldPosition.z);
            body.quaternion.copy(child.quaternion);
          }
        });
        map.remove(collisionMap);

        new THREE.GLTFLoader().load("/Honda_Civic_Sport_Touring.glb", function(model) {
          car = model.scene;
          car.traverse(x => {
            if (x.material) x.material.vertexColors = false;
          });
          new THREE.TextureLoader().load("/1.png", function(texture) {
            let pmremGenerator = new THREE.PMREMGenerator(renderer);
            envMap = pmremGenerator.fromEquirectangular(texture).texture;
            car.getObjectByName("Exterior_Shell").material.envMap = envMap;
            car.getObjectByName("Windows").material.envMap = envMap;
          });
          scene.add(car);

          car.shadow = car.getObjectByName("Shadow");
          car.shadow.shadowSize = [car.shadow.scale.x, car.shadow.scale.y];
          scene.add(car.shadow);

          const chassisMesh = car.getObjectByName("Chassis");
          chassisMesh.rotation.order = "YXZ";
          car.chassis = chassisMesh;
          vehicleMeshes.push(chassisMesh);
          chassisMesh.add(camera);

          camera.position.set(0, 1, -7);
          camera.rotation.y = Math.PI;

          const box = new THREE.Box3().setFromObject(chassisMesh);
          const size = box.getSize(new THREE.Vector3());
          const chassisBody = new CANNON.Body({ mass: vehicleWeight - (wheelWeight * 4), shape: new CANNON.Box(new CANNON.Vec3(size.x / 2, size.y / 2, size.z / 2)), material: carMaterial });
          vehicleBodies.push(chassisBody);

          vehicle = new CANNON.RaycastVehicle({ chassisBody: chassisBody, indexRightAxis: 0, indexUpAxis: 1, indexForwardAxis: 2 });
          const options = {
            radius: 0.33,
            directionLocal: new CANNON.Vec3(0, -1, 0),
            suspensionStiffness: 30,
            suspensionRestLength: 0.18,
            frictionSlip: 2,
            dampingRelaxation: 6,
            dampingCompression: 4.5,
            maxSuspensionForce: 120000,
            maxSuspensionTravel: 1,
            rollInfluence: 0.08,
            axleLocal: new CANNON.Vec3(-1, 0, 0),
            chassisConnectionPointLocal: new CANNON.Vec3(1, 1, 0)
          };
          const wheel_fl = car.getObjectByName("Wheel_FL");
          const wheel_fr = car.getObjectByName("Wheel_FR");
          const wheel_rl = car.getObjectByName("Wheel_RL");
          const wheel_rr = car.getObjectByName("Wheel_RR");
          options.chassisConnectionPointLocal.copy(wheel_rl.position);
          vehicle.addWheel(options);
          options.chassisConnectionPointLocal.copy(wheel_rr.position);
          vehicle.addWheel(options);
          options.chassisConnectionPointLocal.copy(wheel_fl.position);
          vehicle.addWheel(options);
          options.chassisConnectionPointLocal.copy(wheel_fr.position);
          vehicle.addWheel(options);
          vehicle.addToWorld(world);
          for (let i = 0; i < vehicle.wheelInfos.length; i++) {
            const wheel = vehicle.wheelInfos[i];
            wheel.index = i;
            const wheelBody = new CANNON.Body({ mass: wheelWeight, material: wheelMaterial });
            const q = new CANNON.Quaternion();
            q.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), Math.PI / 2);
            wheelBody.addShape(new CANNON.Cylinder(wheel.radius, wheel.radius, wheel.radius / 2, 20), new CANNON.Vec3(), q);
            wheelBody.wheel = wheel;
            vehicleBodies.push(wheelBody);
            const wheelMesh = car.getObjectByName("Wheels").children[i];
            vehicleMeshes.push(wheelMesh);
          }
          chassisBody.position.y = 1;
          animate();
        });
        map.traverse(x=>(x.castShadow=true,x.receiveShadow=true));
        map.getObjectByName("Plane009").material.map.anisotropy = 4;
        map.getObjectByName("vegetation_long_grass_04_0001").material.map.anisotropy = 4;
        map.getObjectByName("Mesh_2_6").material.map.anisotropy = 4;
        map.getObjectByName("Plane009").material.map.needsUpdate = true;
        map.getObjectByName("vegetation_long_grass_04_0001").material.map.needsUpdate = true;
        map.getObjectByName("Mesh_2_6").material.map.needsUpdate = true;
        renderer.shadowMap.needsUpdate = true;
      });

      new THREE.GLTFLoader().load("/propcars.glb", function(model) {
        model.scene.getObjectByName("wrapper").children.forEach((car, i) => {
          car.speed = 0.5;
          car.scale.set(0.8, 0.8, 0.8);
          car.position.set(200 - (i * 30) + (Math.random() * 10), 1, 18);
          car.rotation.set(-Math.PI / 2 - 0.05, 0, -Math.PI / 2);
          scene.add(car);
          propCars.push(car);
        });
      });

      const PointerControls = new PointerLockControls(camera, renderer.domElement);
      PointerControls.maxPolarAngle = Math.PI - 0.15;
      PointerControls.minPolarAngle = 0.15;
      PointerControls.pointerSpeed = 0.6;
      PointerControls.isLocked = false;
    </script>
  </body>
</html>
