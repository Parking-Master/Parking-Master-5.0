<!DOCTYPE html>
<html>
  <head>
    <title>cannon.js - RaycastVehicle</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
      html, body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <script src="three.js"></script>
    <script src="GLTFLoader.js"></script>
    <script src="cannon.js"></script>
    <script>
      const renderer = new THREE.WebGLRenderer();
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);

      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      scene.add(camera);
      directionalLight.position.set(-10, 10, 0);
      scene.add(directionalLight);

      window.addEventListener("resize", function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      let vehicleBodies = [];
      let vehicleMeshes = [];

      function animate() {
        world.step(1 / 60);
        for (let i = 0; i < vehicleBodies.length; i++) {
          const body = vehicleBodies[i];
          const mesh = vehicleMeshes[i];
          if (body.wheel) {
            vehicle.updateWheelTransform(body.wheel.index);
            body.position.copy(body.wheel.worldTransform.position);
            body.quaternion.copy(body.wheel.worldTransform.quaternion);
          }
          mesh.position.copy(body.position);
          mesh.quaternion.copy(body.quaternion);
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      const world = new CANNON.World();
      world.gravity.set(0, -10, 0);

      const groundMaterial = new CANNON.Material('groundMaterial');
      const wheelMaterial = new CANNON.Material('wheelMaterial');
      const wheelGroundContactMaterial = new CANNON.ContactMaterial(wheelMaterial, groundMaterial, { friction: 0.3, restitution: 0, contactEquationStiffness: 1000 });
      world.addContactMaterial(wheelGroundContactMaterial);

      const chassisBody = new CANNON.Body({ mass: 150, shape: new CANNON.Box(new CANNON.Vec3(1, 0.3, 2)) });
      vehicleBodies.push(chassisBody);
      const chassisMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 4), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
      vehicleMeshes.push(chassisMesh);
      scene.add(chassisMesh);
      chassisMesh.add(camera);
      camera.rotation.y = Math.PI;
      
      const vehicle = new CANNON.RaycastVehicle({ chassisBody: chassisBody, indexRightAxis: 0, indexUpAxis: 1, indexForwardAxis: 2 });
      const options = {
        radius: 0.3,
        directionLocal: new CANNON.Vec3(0, -1, 0),
        suspensionStiffness: 45,
        suspensionRestLength: 0.4,
        frictionSlip: 5,
        dampingRelaxation: 2.3,
        dampingCompression: 4.5,
        maxSuspensionForce: 200000,
        rollInfluence:  0.01,
        axleLocal: new CANNON.Vec3(-1, 0, 0),
        chassisConnectionPointLocal: new CANNON.Vec3(1, 1, 0),
        maxSuspensionTravel: 0.25,
        customSlidingRotationalSpeed: -30,
        useCustomSlidingRotationalSpeed: true,
      };
      
      const axlewidth = 0.7;
      options.chassisConnectionPointLocal.set(axlewidth, 0, -1);
      vehicle.addWheel(options);
      options.chassisConnectionPointLocal.set(-axlewidth, 0, -1);
      vehicle.addWheel(options);
      options.chassisConnectionPointLocal.set(axlewidth, 0, 1);
      vehicle.addWheel(options);
      options.chassisConnectionPointLocal.set(-axlewidth, 0, 1);
      vehicle.addWheel(options);
      vehicle.addToWorld(world);
      
      for (let i = 0; i < vehicle.wheelInfos.length; i++) {
        const wheel = vehicle.wheelInfos[i];
        wheel.index = i;
        const wheelBody = new CANNON.Body({ mass: 1, material: wheelMaterial });
        const q = new CANNON.Quaternion();
        q.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), Math.PI / 2);
        wheelBody.addShape(new CANNON.Cylinder(wheel.radius, wheel.radius, wheel.radius / 2, 20), new CANNON.Vec3(), q);
        wheelBody.wheel = wheel;
        vehicleBodies.push(wheelBody);
        const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(wheel.radius, wheel.radius, wheel.radius / 2, 10), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        cylinder.geometry.rotateZ(Math.PI / 2);
        scene.add(cylinder);
        vehicleMeshes.push(cylinder);
      }
      
      const engineForce = 800;
      const maxSteerVal = 0.3;
      function navigate(e) {
        if (e.type != 'keydown' && e.type != 'keyup') return;
        var keyup = e.type == 'keyup';
        vehicle.setBrake(0, 0);
        vehicle.setBrake(0, 1);
        vehicle.setBrake(0, 2);
        vehicle.setBrake(0, 3);
        switch(e.keyCode) {
          case 38:
            vehicle.applyEngineForce(keyup ? 0 : -engineForce, 2);
            vehicle.applyEngineForce(keyup ? 0 : -engineForce, 3);
            break;
          case 40:
            vehicle.applyEngineForce(keyup ? 0 : engineForce, 2);
            vehicle.applyEngineForce(keyup ? 0 : engineForce, 3);
            break;
          case 39:
            vehicle.setSteeringValue(keyup ? 0 : -maxSteerVal, 2);
            vehicle.setSteeringValue(keyup ? 0 : -maxSteerVal, 3);
            break;
          case 37:
            vehicle.setSteeringValue(keyup ? 0 : maxSteerVal, 2);
            vehicle.setSteeringValue(keyup ? 0 : maxSteerVal, 3);
            break;
        }
      }
      window.addEventListener("keydown", navigate);
      window.addEventListener("keyup", navigate);

      new THREE.GLTFLoader().load("/scene.glb", function(model) {
        map = model.scene;
        scene.add(map);
        const collisionMap = map.getObjectByName("CollisionMap");
        collisionMap.traverse(child => {
          if (child.isMesh) {
            const rotation = new THREE.Vector3(child.rotation.x, child.rotation.y, child.rotation.z);
            child.rotation.set(0, 0, 0);
            const box = new THREE.Box3().setFromObject(child);
            const size = box.getSize(new THREE.Vector3());
            const shape = new CANNON.Box(new CANNON.Vec3(size.x / 2, size.y / 2, size.z / 2));
            const body = new CANNON.Body({ mass: 0, shape: shape, material: groundMaterial });
            world.add(body);
            child.rotation.set(rotation.x, rotation.y, rotation.z);
            box.setFromObject(child);
            const worldPosition = box.min.add(box.max).divide(new THREE.Vector3(2, 2, 2));
            body.position.set(worldPosition.x, worldPosition.y, worldPosition.z);
            body.quaternion.copy(child.quaternion);
          }
        });
        map.remove(collisionMap);
        animate();
      });
    </script>
  </body>
</html>
